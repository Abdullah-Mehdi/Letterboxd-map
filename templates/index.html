<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Letterboxd World Map</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
    <header>
        <h1>Letterboxd World Map</h1>
        <p>See which countries your watched films come from.</p>
    </header>

    <section id="input-section">
        <form id="upload-form">
            <label class="file-label" for="file-input">
                <span id="file-name">Choose watched.csv or export .zip</span>
                <input type="file" id="file-input" accept=".csv,.zip" required>
            </label>
            <button type="submit">Generate Map</button>
        </form>
        <p class="input-hint">
            Export your data from
            <a href="https://letterboxd.com/settings/data/" target="_blank" rel="noopener">Letterboxd settings</a>
        </p>
    </section>

    <div id="error-banner" class="hidden">
        <p id="error-text"></p>
        <button id="error-dismiss">Dismiss</button>
    </div>

    <section id="progress-section" class="hidden">
        <div id="spinner" class="spinner hidden"></div>
        <div id="progress-bar-wrapper">
            <div class="progress-bar-container">
                <div id="progress-bar" class="progress-bar"></div>
            </div>
            <p id="progress-text">Starting...</p>
        </div>
    </section>

    <section id="map-section" class="hidden">
        <div id="map-container"></div>
    </section>

    <section id="ranking-section" class="hidden">
        <div class="ranking-header">
            <h2>Countries by Films Watched</h2>
            <label class="toggle">
                <input type="checkbox" id="show-zero-toggle">
                <span>Show countries with 0 films</span>
            </label>
        </div>
        <table id="ranking-table">
            <thead>
                <tr>
                    <th>#</th>
                    <th>Country</th>
                    <th class="sortable" data-sort="count">Films <span class="sort-arrow">▼</span></th>
                    <th class="sortable" data-sort="rating">Avg Rating <span class="sort-arrow"></span></th>
                </tr>
            </thead>
            <tbody id="ranking-body"></tbody>
        </table>
    </section>

    <aside id="film-panel" class="hidden">
        <div class="panel-header">
            <h2 id="panel-country"></h2>
            <span id="panel-count"></span>
            <button id="panel-close">&times;</button>
        </div>
        <ul id="panel-list"></ul>
    </aside>

    <div id="tooltip" class="tooltip"></div>

    <script src="https://d3js.org/d3.v7.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/topojson-client@3"></script>
    <script src="{{ url_for('static', filename='js/map.js') }}"></script>
</body>
</html>
